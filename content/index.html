<body>
    <header>

        <section id="srch">

        </section>

        <section id="bkm">
           <h2>Your Bookmarks</h2>

            </div>

        <section id="browse">
            <h2>Browse Manga</h2>
            <hr>
            <div id="page">

                    <!-- eventual card with images -->
                    <div class="card">
                    <figure>
                        
                        <img src="https://cdn.myanimelist.net/images/anime/9/76662.jpg" alt="jshkvol19">
                        <figcaption><li class="card-title">Manga Title</li><li>Native Manga title</li></figcaption>
                    </figure>           
                    </div>
                    <div class="card">
                    <figure>
                        
                        <img src="https://cdn.myanimelist.net/images/anime/9/76662.jpg" alt="jshkvol19">
                        <figcaption><li class="card-title">Manga Title</li><li>Native Manga title</li></figcaption>

                    </div>
                <div id="list"></div>

            </div>
        </section>
    </main>
    <footer>
        <nav>Home, Bookmarks, Filter by Genre, Random, About, Contact, Download</nav>
    </footer>
    </div>
</body>

<script>
   
// Here we define our query as a multi-line string
// Storing it in a separate .graphql/.gql file is also possible
const query = `
query (
  $page: Int = 1
  $type: MediaType
) {
  Page(page: $page, perPage: 20) {
    pageInfo {
      hasNextPage
    }
    media(
      type: $type
    ) {
      id
      title {
        romaji
        english
        native
      }
        genres
    }
  }
}
`;

// Define our query variables and values that will be used in the query request
const variables = {
    type: 'MANGA',
};

// Define the config we'll need for our Api request
const url = 'https://graphql.anilist.co',
    options = {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
        },
        body: JSON.stringify({
            query: query,
            variables: variables
        })
    };

// Make the HTTP Api request
fetch(url, options).then(handleResponse)
    .then(handleData)
    .catch(handleError);

function handleResponse(response) {
    return response.json().then(function (json) {
        return response.ok ? json : Promise.reject(json);
    });
}

function handleData(data) {
    console.log(data);
    showData(data);
}

function handleError(error) {
    alert('Error, check console');
    console.error(error);
}

function showData(records){
    console.log(records.data.Page.media);
    let array = records.data.Page.media;
    let result = document.querySelector('#page');
    let html = '';
    for (let rec of array){
        html += `<div class="card">
            <ul>
            <!-- <li>${rec.id}</li> -->
            <li class="card-title">${rec.title.romaji}</li>
            <li>${rec.title.english}</li>
            <li>${rec.title.native}</li>
            <li class="genre"> `;
        for(let g of rec.genres){
            html +=`${g}, `;   
        }
        html += `</li>
        <!--BOOKMARK BUTTON -->
        <button onclick ='addBookmark(${JSON>stringify(rec)})'>
        Bookmark
        </button>
            </ul>
            </div>`;
    }
    result.innerHTML = html;
}

</script>
</html>
